version: 2

models:
  - name: stg_customers
    description: Customer staging model

    columns:
      - name: customer_id
        description: Unique customer identifier
        tests:
          - not_null
          - unique

      - name: customer_name
        description: Customer name
        tests:
          - not_null

  - name: stg_products
    description: Product staging model

    columns:
      - name: product_id
        description: Unique product identifier
        tests:
          - not_null
          - unique

      - name: product_name
        description: Product name
        tests:
          - not_null

  - name: stg_orders
    description: Orders staging model

    columns:
      - name: order_id
        description: Unique order identifier
        tests:
          - not_null
          - unique

      - name: customer_id
        description: Customer foreign key
        tests:
          - not_null

      - name: product_id
        description: Product foreign key
        tests:
          - not_null

      - name: amount
        description: Order amount
        tests:
          - not_null